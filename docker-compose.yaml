x-airflow-common: &airflow-common
  build: .
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__FERNET_KEY: "PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM="
    AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "False"
    PYTHONPATH: /opt/airflow
  volumes:
    - airflow_home:/opt/airflow                 # shared metadata DB + home
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./utils:/opt/airflow/utils
    - ./data:/opt/airflow/data
    - ./datamart:/opt/airflow/datamart
    - ./model_bank:/opt/airflow/model_bank
    - ./artifacts:/opt/airflow/artifacts

services:
  airflow-init:
    <<: *airflow-common
    entrypoint: >
      /bin/bash -c "airflow db init &&
      airflow users create --username admin --password admin
      --firstname Admin --lastname User --role Admin
      --email admin@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    depends_on: [airflow-init]
    ports:
      - "8080:8080"
    command: >
      bash -c "echo '' &&
      echo '==========================================================' &&
      echo '  Airflow UI ready at:  http://localhost:8080' &&
      echo '  Login:  admin / admin' &&
      echo '  DAG:    credit_default_ml_pipeline  (toggle ON to backfill)' &&
      echo '==========================================================' &&
      echo '' &&
      exec airflow webserver"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    depends_on: [airflow-init]
    command: scheduler
    restart: always

volumes:
  airflow_home:
